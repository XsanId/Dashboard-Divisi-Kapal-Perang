<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Divisi Kapal Perang</title>
  <link rel="icon" href="https://www.freepnglogos.com/images/one-piece-logo-70.html" />
  <style>
    /* Reset Dasar */
    * {
      box-sizing: border-box;
    }
    
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #f4f4f7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden; /* Mencegah scroll pada body utama */
    }

    /* Container Aplikasi */
    .app-container {
      position: relative;
      width: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Wrapper untuk menangani penskalaan otomatis */
    #iframe-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      overflow-x: hidden; /* Pastikan tidak ada scroll horizontal */
      overflow-y: auto;   /* Izinkan scroll vertikal jika dashboard panjang */
      -webkit-overflow-scrolling: touch;
    }

    /* Iframe Styling */
    iframe {
      display: block;
      border: none;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.3s ease;
      transform-origin: 0 0;
    }

    iframe.loaded {
      opacity: 1;
    }

    /* Loading Spinner */
    .loader-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.5s ease, visibility 0.5s;
    }

    .loader {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #007bff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loader-text {
      margin-top: 15px;
      color: #666;
      font-size: 14px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- Layar Pemuatan -->
    <div id="loader" class="loader-wrapper">
      <div class="loader"></div>
      <div class="loader-text">Menyiapkan Dashboard...</div>
    </div>

    <!-- Konten Utama -->
    <div id="iframe-wrapper">
      <iframe
        id="app-frame"
        src="https://script.google.com/macros/s/AKfycbwG9pT_7xyRw3mfkMIIqj1By-9TNCq2hlpIvF3XgR2us0JMufnmCOGIvEDRL8CoBFGU/exec"
        scrolling="no"
        allowfullscreen="true"
        allow="fullscreen; camera; microphone; display-capture; geolocation;">
      </iframe>
    </div>
  </div>

  <script>
    const iframe = document.getElementById('app-frame');
    const loader = document.getElementById('loader');

    function adjustView() {
      const windowWidth = window.innerWidth;
      
      // Jika di HP (layar kecil), kita paksa dashboard menggunakan lebar desktop (misal 1280px)
      // lalu kita kecilkan (zoom out) agar pas dengan lebar HP.
      if (windowWidth < 1024) { 
        const desktopWidth = 1280; // Standar lebar dashboard agar tidak berantakan
        const scale = windowWidth / desktopWidth;
        
        iframe.style.width = desktopWidth + 'px';
        iframe.style.height = (window.innerHeight / scale) + 'px';
        iframe.style.transform = `scale(${scale})`;
      } else {
        // Jika di Desktop, gunakan ukuran standar
        iframe.style.width = '100%';
        iframe.style.height = '100%';
        iframe.style.transform = 'none';
      }
    }

    // Jalankan saat pertama kali dan saat layar diputar/resize
    window.addEventListener('resize', adjustView);
    adjustView();

    iframe.onload = function() {
      loader.classList.add('hidden');
      iframe.classList.add('loaded');
      adjustView();
    };

    // Timeout keamanan jika koneksi lambat
    setTimeout(() => {
      if (!loader.classList.contains('hidden')) {
        loader.classList.add('hidden');
        iframe.classList.add('loaded');
        adjustView();
      }
    }, 10000);
  </script>
</body>
</html>
